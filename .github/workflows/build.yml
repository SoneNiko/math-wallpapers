name: Build and Release Wallpapers

permissions:
  contents: write
  pages: write
  id-token: write

on:
  push:
    tags:
      - '*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Cache LaTeX packages
        id: cache-latex
        uses: actions/cache@v4
        with:
          path: |
            /var/cache/apt/archives
            /usr/share/texmf
            /usr/share/texlive
          key: latex-${{ runner.os }}-v2

      - name: Install LaTeX
        if: steps.cache-latex.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends             imagemagick             latexmk             texlive-latex-extra             texlive-fonts-extra             texlive-science             texlive-pictures

      - name: Install ImageMagick (always)
        run: |
          sudo apt-get install -y --no-install-recommends imagemagick ghostscript
          sudo find /etc/ImageMagick* -name policy.xml -exec sudo sed -i 's/rights="none" pattern="PDF"/rights="read|write" pattern="PDF"/' {} \;

      - name: Install requirements
        run: pip install -r requirements.txt

      - name: Move wallpaper.sty to texmf-local
        run: |
          sudo mkdir -p /usr/local/texlive/texmf-local/tex/latex
          sudo cp wallpaper.sty /usr/local/texlive/texmf-local/tex/latex/
          sudo mktexlsr

      - name: Run wallpapers.py
        run: python wallpapers.py

      - name: Zip results folder
        run: zip -r results.zip results

      - name: Zip results-inverted folder
        run: zip -r results-inverted.zip results-inverted

      - name: Prepare individual files
        id: prepare_files
        run: |
          mkdir release_files
          find results -type f | while read file; do
            newname=$(echo "$file" | sed 's/results\///; s/\//-/g')
            cp "$file" "release_files/$newname"
          done

      - name: Prepare individual files inverted
        id: prepare_files_inverted
        run: |
          mkdir release_files_inverted
          find results-inverted -type f | while read file; do
            newname=$(echo "$file" | sed 's/results-inverted\///; s/\//-/g')
            cp "$file" "release_files_inverted/inv_$newname"
          done

      - name: Build gallery index.html
        run: python generate_index.py

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: "Automated release for tag ${{ github.ref_name }}"
          files: |
            results-inverted.zip
            results.zip
            release_files/*
            release_files_inverted/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create deploy folder
        run: |
          mkdir -p deploy
          cp -r release_files/* deploy/
          cp -r release_files_inverted/* deploy/

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
